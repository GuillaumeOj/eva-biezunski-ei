name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # lfs not enabled: lint/typecheck/tests don't need the binary assets
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Lint & format (biome)
        run: bun run lint
      - name: Type-check
        run: bun run typecheck
      - name: Tests
        run: bun run test
